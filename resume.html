<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV / Résumé · Alexander Liss</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1916;
      --ink-mid: #4a4844;
      --ink-faint: #e8e6e0;
      --link: #1a4a8a;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      color: var(--ink-mid);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    .bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--ink-faint);
      background: #fff;
    }
    .bar a {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--link);
      text-decoration: none;
    }
    .bar a:hover { text-decoration: underline; }
    .bar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .viewer {
      flex: 1;
      min-height: 0;
      background: #525659;
    }
    .viewer iframe {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 53px);
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <header class="bar">
    <a href="index.html">← Back to site</a>
    <span class="bar-title">Alexander Liss — CV / Résumé</span>
    <a href="Alexander%20Liss%20Resume.pdf" download="Alexander-Liss-Resume.pdf">Download PDF</a>
  </header>
  <div class="viewer">
    <iframe src="Alexander%20Liss%20Resume.pdf" title="Alexander Liss resume PDF"></iframe>
  </div>
</body>
</html>
